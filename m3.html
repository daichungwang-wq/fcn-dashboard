<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M3｜FCN 決策引擎</title>

<style>
body {
  font-family: Arial, "Microsoft JhengHei", sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}
.page {
  max-width: 1200px;
  margin: auto;
}
h1 { font-size: 28px; }

.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid #ddd;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  background: #111;
  color: #fff;
  padding: 8px;
}

.table td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.green { color: #2e7d32; }
.red { color: #c62828; }
.gray { color: #666; }

.section-title {
  font-size: 18px;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="page">

<h1>📊 M3｜FCN 決策引擎（Final）</h1>

<div id="summary" class="card"></div>

<div id="stock-section" class="card"></div>

<div id="fcn-section" class="card"></div>

</div>

<script>

// ==============================
// 工具
// ==============================
function toNumber(v, d=0){
  const n = Number(v);
  return Number.isFinite(n) ? n : d;
}

// ==============================
// 載入資料
// ==============================
async function loadAll() {
  const [pool, runtime, config] = await Promise.all([
    fetch("./data/pool30.json").then(r=>r.json()),
    fetch("./data/market_runtime.json").then(r=>r.json()),
    fetch("./data/parameter_matrix.json").then(r=>r.json())
  ]);

  return { pool, runtime, config };
}

// ==============================
// Stock 評分（簡化版）
// ==============================
function calcStock(stock, runtime){
  const m = runtime[stock.symbol] || {};

  const pure = toNumber(stock.base_score || 6);
  const snapshot = toNumber(m.ret_1d, 0)*10; // 簡化版
  const event = pure + snapshot;

  return {
    ...stock,
    pure,
    snapshot,
    event
  };
}

// ==============================
// 分類（用 config）
// ==============================
function classify(stock, cfg){
  const pure = stock.pure;
  const event = stock.event;

  if (cfg.reject_if_suggestion_avoid && pure < 3) return "reject";

  if (pure >= cfg.clean_min_pure && event >= cfg.clean_min_event){
    return "clean";
  }

  if (pure >= cfg.watch_min_pure || event >= cfg.watch_min_event){
    return "watch";
  }

  return "reject";
}

// ==============================
// M3 主流程
// ==============================
function runM3(pool, runtime, config){

  const selCfg = config["M3_股票篩選情境參數"];
  const scenarios = config["M3_FCN情境組合參數"].scenarios;
  const rankCfg = config["M3_排名評分參數"];

  // --- 股票處理 ---
  const stocks = pool.map(s => calcStock(s, runtime));

  stocks.forEach(s=>{
    s.bucket = classify(s, selCfg);
  });

  const clean = stocks.filter(s=>s.bucket==="clean");
  const watch = stocks.filter(s=>s.bucket==="watch");
  const reject = stocks.filter(s=>s.bucket==="reject");

  // --- FCN 模擬 ---
  const fcnList = [];

  scenarios.forEach(sc => {

    clean.forEach(a=>{
      clean.forEach(b=>{
        if (a.symbol === b.symbol) return;

        const avg = (a.event + b.event)/2;

        const event_fcn = avg + toNumber(sc.rate[0],0)/2;
        const pure_fcn = avg;
        const delta = event_fcn - pure_fcn;

        let suggestion = "❌";
        if (event_fcn >= rankCfg.strong_buy_min_event_fcn) suggestion="🔥";
        else if (event_fcn >= rankCfg.buy_min_event_fcn) suggestion="✅";
        else if (event_fcn >= rankCfg.watch_min_event_fcn) suggestion="⚠";

        fcnList.push({
          scenario: sc["名稱"],
          basket: `${a.symbol}/${b.symbol}`,
          pure_fcn,
          event_fcn,
          delta,
          suggestion
        });

      });
    });

  });

  fcnList.sort((a,b)=>b.event_fcn-a.event_fcn);

  return {
    stocks,
    clean,
    watch,
    reject,
    fcnList
  };
}

// ==============================
// UI
// ==============================
function render(result){

  document.getElementById("summary").innerHTML = `
    <div>Stock: ${result.stocks.length}</div>
    <div>Clean: ${result.clean.length}</div>
    <div>Watch: ${result.watch.length}</div>
    <div>Reject: ${result.reject.length}</div>
  `;

  document.getElementById("stock-section").innerHTML = `
    <div class="section-title">📌 Clean Pool</div>
    ${result.clean.map(s=>`
      <div>${s.symbol} | Pure:${s.pure.toFixed(1)} | Event:${s.event.toFixed(1)}</div>
    `).join("")}
  `;

  document.getElementById("fcn-section").innerHTML = `
    <div class="section-title">💰 FCN 建議</div>
    <table class="table">
      <tr>
        <th>Scenario</th>
        <th>Basket</th>
        <th>Pure</th>
        <th>Event</th>
        <th>Δ</th>
        <th>建議</th>
      </tr>
      ${result.fcnList.slice(0,20).map(f=>`
        <tr>
          <td>${f.scenario}</td>
          <td>${f.basket}</td>
          <td>${f.pure_fcn.toFixed(1)}</td>
          <td>${f.event_fcn.toFixed(1)}</td>
          <td>${f.delta.toFixed(1)}</td>
          <td>${f.suggestion}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

// ==============================
// MAIN
// ==============================
async function main(){
  const { pool, runtime, config } = await loadAll();
  const result = runM3(pool, runtime, config);
  render(result);
}

main();

</script>
</body>
</html>
