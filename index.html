<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>振宇 FCN 系統 V6.1</title>
  <style>
    :root{
      --bg:#0b0d10;
      --card:#171a1f;
      --card2:#11141a;
      --line:#2a2f36;
      --text:#f3f5f7;
      --muted:#aab2bd;
      --ok:#24c16b;
      --watch:#f0b429;
      --risk:#e25555;
      --blue:#5aa9ff;
      --pill:#0f1318;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{padding:16px}
    .wrap{max-width:1180px;margin:0 auto}
    h1{font-size:32px;margin:0 0 8px;font-weight:800}
    h2{font-size:24px;margin:0 0 12px;font-weight:800}
    h3{font-size:18px;margin:0 0 8px;font-weight:700}
    .muted{color:var(--muted)}
    .note{color:var(--muted);line-height:1.5}
    .section{margin-top:18px}
    .panel,.card,.kpi{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 0 0 1px rgba(255,255,255,0.01) inset;
    }
    .panel{padding:14px}
    .card{padding:12px}
    .kpi{padding:16px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .num{font-size:30px;font-weight:800;margin-top:8px}
    .ok{color:var(--ok);font-weight:800}
    .watch{color:var(--watch);font-weight:800}
    .risk{color:var(--risk);font-weight:800}
    .blue{color:var(--blue);font-weight:800}
    .tag{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      background:var(--pill);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      margin:6px 6px 0 0;
    }
    .pill{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid currentColor;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .pill.ok{background:rgba(36,193,107,0.08)}
    .pill.watch{background:rgba(240,180,41,0.08)}
    .pill.risk{background:rgba(226,85,85,0.08)}
    .headline{
      display:flex;justify-content:space-between;gap:12px;align-items:flex-start
    }
    .subtext{font-size:13px;color:var(--muted);line-height:1.5}
    .summary-box{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-top:12px;
      line-height:1.6;
    }
    details.news{
      margin-top:10px;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:var(--card2);
    }
    details.news summary{
      list-style:none;
      cursor:pointer;
      padding:12px;
    }
    details.news summary::-webkit-details-marker{display:none}
    details.news .content{
      padding:0 12px 12px 12px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th,td{
      padding:10px 8px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }
    th{color:var(--muted);font-weight:700}
    tr:last-child td{border-bottom:none}
    .bar{
      width:100%;
      height:10px;
      background:#0f1115;
      border:1px solid var(--line);
      border-radius:999px;
      overflow:hidden;
      margin-top:8px;
    }
    .fill{height:100%}
    .fill.ok{background:var(--ok)}
    .fill.watch{background:var(--watch)}
    .fill.risk{background:var(--risk)}
    .btns{margin-top:10px}
    .btn{
      display:inline-block;
      border:none;
      border-radius:10px;
      padding:8px 14px;
      margin-right:8px;
      font-size:14px;
      font-weight:700;
    }
    .btn.yes{background:#2ecc71;color:#062d16}
    .btn.no{background:#ff5b5b;color:#fff}
    .small{font-size:12px}
    .empty{
      border:1px dashed var(--line);
      border-radius:12px;
      padding:12px;
      color:var(--muted);
      font-size:14px;
    }
    .footer-space{height:24px}
    @media (max-width:980px){
      .grid4{grid-template-columns:repeat(2,1fr)}
      .grid3{grid-template-columns:repeat(2,1fr)}
    }
    @media (max-width:720px){
      body{padding:12px}
      h1{font-size:28px}
      h2{font-size:21px}
      .grid4,.grid3,.grid2{grid-template-columns:1fr}
      table{font-size:13px}
      th,td{padding:8px 6px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>振宇 FCN 系統 V6.1</h1>
    <div id="app" class="note">資料載入中...</div>
    <div class="footer-space"></div>
  </div>

  <script>
    function cls(level){
      if(level === "ok") return "ok";
      if(level === "risk") return "risk";
      return "watch";
    }

    function esc(v){
      return String(v ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function fmtNum(v, digits=2){
      const n = Number(v);
      if (Number.isNaN(n)) return esc(v);
      return n.toFixed(digits);
    }

    function impactPill(item){
      if(item.affects_fcn){
        const score = Number(item.impact_score || 0);
        if(score < 0) return '<span class="pill risk">🔥 影響 FCN</span>';
        if(score > 0) return '<span class="pill ok">🔥 有利 FCN</span>';
        return '<span class="pill watch">🔥 需觀察</span>';
      }
      return '<span class="pill">影響有限</span>';
    }

    function renderNews(items, emptyText){
      if(!items || !items.length){
        return `<div class="empty">${esc(emptyText)}</div>`;
      }
      return items.map(item => `
        <details class="news">
          <summary>
            <div class="headline">
              <div>
                <div style="font-weight:800;line-height:1.5;">${esc(item.title)}</div>
                <div class="subtext" style="margin-top:6px;">${esc(item.summary || "")}</div>
              </div>
              <div>${impactPill(item)}</div>
            </div>
          </summary>
          <div class="content">${esc(item.content || "")}</div>
        </details>
      `).join("");
    }

    function renderRadar(items){
      if(!items || !items.length){
        return `<div class="empty">暫無風險雷達資料</div>`;
      }
      return items.map(item => `
        <div class="card">
          <div class="headline">
            <div>
              <div style="font-weight:700;">${esc(item.label)}</div>
              <div class="small muted">目前值：${esc(item.value)}%</div>
            </div>
            <div class="pill ${cls(item.type)} ${cls(item.type)}">${esc(item.type === "ok" ? "穩定" : item.type === "risk" ? "偏高" : "觀察")}</div>
          </div>
          <div class="bar">
            <div class="fill ${cls(item.type)}" style="width:${Math.max(0, Math.min(100, Number(item.value)||0))}%"></div>
          </div>
        </div>
      `).join("");
    }

    function renderRankings(items){
      if(!items || !items.length){
        return `<div class="empty">暫無風險前 10 名資料</div>`;
      }
      return `
        <table>
          <thead>
            <tr>
              <th>FCN</th>
              <th>最弱標的</th>
              <th>現價</th>
              <th>執行價</th>
              <th>下限價</th>
              <th>狀態</th>
              <th>距下限</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr>
                <td>${esc(item.code)}</td>
                <td>${esc(item.stock)}</td>
                <td>${fmtNum(item.price)}</td>
                <td>${fmtNum(item.strike)}</td>
                <td>${fmtNum(item.barrier)}</td>
                <td><span class="${cls(item.level)}">${esc(item.status)}</span></td>
                <td>${fmtNum(item.distance_to_barrier_pct,1)}%</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderStrategy(items){
      if(!items || !items.length){
        return `<div class="empty">暫無策略資料</div>`;
      }
      return items.map(item => `
        <div class="card">
          <div class="headline">
            <div>
              <div style="font-weight:800;">${esc(item.title)}</div>
              <div class="subtext" style="margin-top:6px;">${esc(item.reason || "")}</div>
            </div>
            <div class="pill ${cls(item.level)} ${cls(item.level)}">${esc(item.action)}</div>
          </div>
          <div class="btns">
            <button class="btn yes" type="button">同意</button>
            <button class="btn no" type="button">拒絕</button>
          </div>
        </div>
      `).join("");
    }

    function renderPoolTable(items){
      if(!items || !items.length){
        return `<div class="empty">暫無個股分析資料</div>`;
      }
      return `
        <table>
          <thead>
            <tr>
              <th>股號</th>
              <th>類型</th>
              <th>風險</th>
              <th>波動率</th>
              <th>EKI</th>
              <th>今日建議</th>
              <th>原因</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr>
                <td>${esc(item.symbol)}</td>
                <td>${esc(item.type)}</td>
                <td>${esc(item.risk)}</td>
                <td>${esc(item.volatility)}</td>
                <td>${esc(item.eki)}</td>
                <td><span class="${cls(item.level)}">${esc(item.today)}</span></td>
                <td>${esc(item.reason || "")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderRecoBlock(title, arr, tone){
      if(!arr || !arr.length){
        return `
          <div class="card">
            <div class="${tone}" style="font-weight:800;">${esc(title)}</div>
            <div class="subtext" style="margin-top:8px;">暫無資料</div>
          </div>
        `;
      }
      return `
        <div class="card">
          <div class="${tone}" style="font-weight:800;">${esc(title)}</div>
          ${arr.map(x => `
            <div style="margin-top:10px;">
              <div style="font-weight:700;">${esc(x.symbol)}</div>
              <div class="subtext">${esc(x.reason || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderScenarios(items){
      if(!items || !items.length){
        return `<div class="empty">暫無情境建議</div>`;
      }
      return items.map(item => `
        <div class="card">
          <div style="font-weight:800;">${esc(item.name)}</div>
          <div class="subtext" style="margin-top:8px;">適合標的：${esc((item.targets || []).join(" / "))}</div>
          <div class="subtext">EKI：${esc(item.eki || "")}</div>
          <div class="subtext">天期：${esc(item.tenor || "")}</div>
          <div class="subtext">目標：${esc(item.goal || "")}</div>
        </div>
      `).join("");
    }

    function renderHoldings(items){
      if(!items || !items.length){
        return `<div class="empty">暫無持有中 FCN 精簡資料</div>`;
      }
      return items.map(item => `
        <details class="news">
          <summary>
            <div class="headline">
              <div>
                <div style="font-weight:800;">${esc(item.code)}</div>
                <div class="subtext">Worst-of：${esc(item.stock)}</div>
              </div>
              <div class="pill ${cls(item.level)} ${cls(item.level)}">${esc(item.status)}</div>
            </div>
          </summary>
          <div class="content">
            現價 ${fmtNum(item.price)}｜執行價 ${fmtNum(item.strike)}｜下限價 ${fmtNum(item.barrier)}｜距下限 ${fmtNum(item.distance_to_barrier_pct,1)}%
          </div>
        </details>
      `).join("");
    }

    async function loadData(){
      const app = document.getElementById("app");
      try{
        const res = await fetch("data.json?t=" + Date.now());
        if(!res.ok) throw new Error("讀取 data.json 失敗");
        const data = await res.json();

        const summary = data.summary || {};
        const brief = data.morning_brief || {};
        const reco = data.today_recommendations || {};
        const pool = data.pool_analysis || {};

        app.innerHTML = `
          <div class="note">
            V6.1 晨報強化版：已整合國際新聞、國際財經、AI 趨勢、總經市場指標與 FCN 解讀。<br>
            最後更新：${esc(data.updated_at || "")}
          </div>

          <div class="section grid4">
            <div class="kpi">
              <div class="muted">持有中 FCN</div>
              <div class="num">${esc(summary.active_fcn_count ?? "")}</div>
            </div>
            <div class="kpi">
              <div class="muted">最需留意</div>
              <div class="num risk">${esc(summary.top_risk_code || "")}</div>
            </div>
            <div class="kpi">
              <div class="muted">Worst-of</div>
              <div class="num watch">${esc(summary.worst_of || "")}</div>
            </div>
            <div class="kpi">
              <div class="muted">今日環境</div>
              <div class="num ${summary.market_env === "可做" ? "ok" : summary.market_env === "觀望" ? "risk" : "watch"}">${esc(summary.market_env || "")}</div>
            </div>
          </div>

          <div class="section panel">
            <h2>🎯 今日結論</h2>
            <div class="summary-box">
              <strong>主結論：</strong>${esc(summary.main_conclusion || "")}
              <div>
                <span class="tag">核心池：NVDA / AVGO / TSM / MSFT</span>
                <span class="tag">高留意：ORCL / COIN</span>
                <span class="tag">更新時間：${esc(data.updated_at || "")}</span>
              </div>
            </div>
          </div>

          <div class="section panel">
            <h2>📊 風險總覽</h2>
            ${renderRankings(data.fcn_rankings || [])}
          </div>

          <div class="section panel">
            <h2>📉 風險雷達</h2>
            <div class="grid2">
              ${renderRadar(data.risk_radar || [])}
            </div>
          </div>

          <div class="section panel">
            <h2>🧠 今日策略</h2>
            <div class="grid3">
              ${renderStrategy(data.strategy_cards || [])}
            </div>
          </div>

          <div class="section panel">
            <h2>🌍 晨報模組 1｜國際新聞</h2>
            ${renderNews(brief.international_news || [], "尚無國際新聞資料")}
          </div>

          <div class="section panel">
            <h2>💹 晨報模組 2｜國際財經新聞</h2>
            ${renderNews(brief.financial_news || [], "尚無國際財經新聞資料")}
          </div>

          <div class="section panel">
            <h2>🤖 晨報模組 3｜AI 趨勢</h2>
            ${renderNews(brief.ai_trend || [], "尚無 AI 趨勢資料")}
          </div>

          <div class="section panel">
            <h2>🏦 晨報模組 4｜總經市場指標</h2>
            ${renderNews(brief.macro || [], "尚無總經市場資料")}
          </div>

          <div class="section panel">
            <h2>📦 FCN Pool 個股分析｜固定 Pool</h2>
            ${renderPoolTable(pool.fixed_pool || [])}
          </div>

          <div class="section panel">
            <h2>🧩 FCN Pool 個股分析｜非固定 Pool</h2>
            ${renderPoolTable(pool.dynamic_pool || [])}
          </div>

          <div class="section panel">
            <h2>⭐ 今日推薦</h2>
            <div class="grid3">
              ${renderRecoBlock("可加入", reco.add || [], "ok")}
              ${renderRecoBlock("持續觀察", reco.watch || [], "watch")}
              ${renderRecoBlock("暫不建議", reco.avoid || [], "risk")}
            </div>
          </div>

          <div class="section panel">
            <h2>🧭 可做的情境建議</h2>
            <div class="grid3">
              ${renderScenarios(data.scenario_suggestions || [])}
            </div>
          </div>

          <div class="section panel">
            <h2>📂 持有中 FCN（精簡）</h2>
            ${renderHoldings(data.holdings_brief || [])}
          </div>
        `;
      } catch(err){
        app.innerHTML = `
          <div class="panel">
            <div class="risk" style="font-weight:800;">讀取失敗</div>
            <div class="subtext" style="margin-top:8px;">${esc(err.message || "未知錯誤")}</div>
            <div class="subtext" style="margin-top:8px;">請確認 repo 裡同時有 <strong>index.html</strong> 與 <strong>data.json</strong>。</div>
          </div>
        `;
      }
    }

    loadData();
  </script>
</body>
</html>
