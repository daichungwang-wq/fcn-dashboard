name: Update FCN Dashboard Data

on:
  schedule:
    - cron: '0 23 * * *'   # 台灣時間早上7點（UTC+8）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update data.json
        run: |
          echo "{
            \"last_update\": \"$(date)\",
            \"status\": \"OK\",
            \"note\": \"Auto updated by V6 system\"
          }" > data.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "auto update data" || echo "no changes"
          git push
