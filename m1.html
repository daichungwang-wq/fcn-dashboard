<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M1 市場資訊 V2 FIXED</title>

<style>
body {
  font-family: Arial, "Microsoft JhengHei";
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.page {
  max-width:1100px;
  margin:auto;
}

.card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:20px;
  border:1px solid #ddd;
}

h1 {font-size:36px;}
h2 {font-size:22px;margin-bottom:12px;}

table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#333;
  color:#fff;
  padding:10px;
  text-align:left;
}

td {
  padding:10px;
  border-bottom:1px solid #eee;
}

.green {color:#2e7d32;}
.red {color:#c62828;}

.news-item {
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.news-item:last-child {border:none;}

.btn {
  margin-top:10px;
  padding:8px 14px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.link {
  color:#1976d2;
  font-size:13px;
}

</style>
</head>

<body>
<div class="page">

<h1>📊 M1｜市場資訊</h1>

<!-- 市場指標 -->
<div class="card">
<h2>📈 市場指標</h2>

<table id="market-table">
<thead>
<tr>
<th>指標</th>
<th>數值</th>
<th>前值</th>
<th>變動</th>
<th>解讀</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- 國際新聞 -->
<div class="card">
<h2>🌍 國際新聞 (10)</h2>
<div id="news-global"></div>
<button class="btn" onclick="toggle('news-global')">展開完整</button>
</div>

<!-- 財經新聞 -->
<div class="card">
<h2>💰 財經新聞 (10)</h2>
<div id="news-finance"></div>
<button class="btn" onclick="toggle('news-finance')">展開完整</button>
</div>

<!-- AI新聞 -->
<div class="card">
<h2>🤖 AI趨勢 (10)</h2>
<div id="news-ai"></div>
<button class="btn" onclick="toggle('news-ai')">展開完整</button>
</div>

</div>

<script>

// =======================
// 工具
// =======================
function fmt(n, isPct=false){
  if(n===undefined || n===null || isNaN(n)) return "-";
  if(isPct) return (n*100).toFixed(2)+"%";
  return Number(n).toFixed(2);
}

function calcChange(now, prev){
  if(!now || !prev) return "-";
  return ((now-prev)/prev);
}

function getColor(v){
  if(v==="-" || v===null) return "";
  return v>=0 ? "green" : "red";
}

// =======================
// 市場指標 render
// =======================
function renderMarket(data){

  const map = [
    ["VIX","VIX"],
    ["S&P500","SPX"],
    ["NASDAQ","NDX"],
    ["Dow","DJI"],
    ["10Y","US10Y"],
    ["20Y","US20Y"],
    ["Oil","OIL"],
    ["Gold","GOLD"],
    ["CPI","CPI"],
    ["PPI","PPI"],
    ["台股","TAIEX"]
  ];

  const tbody = document.querySelector("#market-table tbody");
  tbody.innerHTML = "";

  map.forEach(([name,key])=>{
    const d = data[key] || {};

    const now = d.value;
    const prev = d.prev;

    const chg = calcChange(now, prev);

    let desc = "-";
    if(key==="VIX") desc = chg>0 ? "恐慌升溫" : "市場穩定";
    if(key==="SPX") desc = chg>0 ? "大盤偏多" : "轉弱";
    if(key==="NDX") desc = chg>0 ? "科技偏強" : "科技轉弱";
    if(key==="US10Y") desc = chg>0 ? "殖利率升" : "殖利率降";

    tbody.innerHTML += `
      <tr>
        <td>${name}</td>
        <td>${fmt(now)}</td>
        <td>${fmt(prev)}</td>
        <td class="${getColor(chg)}">${chg==="-"?"-":fmt(chg,true)}</td>
        <td>${desc}</td>
      </tr>
    `;
  });
}

// =======================
// 新聞 render
// =======================
function renderNews(list, el){

  const container = document.getElementById(el);
  container.innerHTML = "";

  list.slice(0,3).forEach(n=>{
    container.innerHTML += `
      <div class="news-item">
        <b>🔥 ${n.title}</b><br>
        ${n.summary}<br>

        影響：${n.impact||"-"}　
        強度：${n.strength||"-"}　
        分數：${n.score||"-"}<br>

        <a class="link" href="${n.url||"#"}" target="_blank">🔗 原文連結</a>
      </div>
    `;
  });
}

// =======================
// 展開
// =======================
function toggle(id){
  alert("完整新聞列表（下一版）");
}

// =======================
// INIT
// =======================
async function init(){

  const market = await fetch("./data/market_runtime.json").then(r=>r.json());
  const news = await fetch("./data/news.json").then(r=>r.json());

  renderMarket(market);
  renderNews(news.global,"news-global");
  renderNews(news.finance,"news-finance");
  renderNews(news.ai,"news-ai");
}

init();

</script>

</body>
</html>
