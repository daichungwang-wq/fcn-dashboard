<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M1 Research Workstation</title>
<style>
:root{
  --bg:#f3f6fb;
  --bg-2:#eaf0f8;
  --panel:#ffffff;
  --panel-soft:#f8fbff;
  --line:#d9e3f0;
  --text:#162235;
  --muted:#5f7187;
  --nav:#11243f;
  --nav-2:#183153;
  --accent:#24b8b2;
  --accent-2:#1d8cf8;
  --good:#0f9f6e;
  --warn:#d97706;
  --bad:#dc2626;
  --shadow:0 10px 30px rgba(22,34,53,.08);
  --radius:18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
  background:linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
  color:var(--text);
}
.wrap{max-width:1720px;margin:0 auto;padding:18px}
.hero{
  background:linear-gradient(90deg,var(--nav),var(--nav-2));
  color:#fff;border-radius:24px;padding:22px 26px;box-shadow:var(--shadow);
}
.hero-top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;flex-wrap:wrap}
.hero h1{margin:0;font-size:38px;letter-spacing:.2px}
.hero .sub{margin-top:8px;color:rgba(255,255,255,.82);font-size:15px;line-height:1.6}
.hero-pills{display:flex;gap:10px;flex-wrap:wrap}
.hero-pills span{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);font-size:12px;font-weight:700}
.query-panel{
  margin-top:18px;background:rgba(5,13,25,.28);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:18px;
}
.query-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.stock-input{
  width:88px;height:52px;border-radius:14px;border:1px solid #d7e2ef;background:#fff;
  text-align:center;font-size:24px;font-weight:800;color:#102033;outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}
.stock-input::placeholder{font-size:18px;color:#8ea0b8;font-weight:700}
.stock-input:focus{border-color:#67d1cb;box-shadow:0 0 0 4px rgba(36,184,178,.14)}
.btn{height:52px;padding:0 18px;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer}
.btn-run{background:linear-gradient(90deg,#37c8c2,#31b4ef);color:#fff}
.btn-clear{background:#ffffff;color:#344256;border:1px solid #d7e2ef}
.query-note{margin-top:10px;color:rgba(255,255,255,.78);font-size:13px}
.dashboard{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-top:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel h3{margin:0 0 12px;font-size:16px}
.panel-body{padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.stat-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px}
.stat-k{font-size:12px;color:var(--muted)}
.stat-v{margin-top:6px;font-size:28px;font-weight:900}
.stat-s{margin-top:4px;font-size:12px;color:var(--muted)}
.cover-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.cover-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px}
.cover-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.cover-name{font-size:13px;font-weight:800}
.cover-val{font-size:13px;color:var(--muted)}
.progress{margin-top:8px;height:10px;background:#e9eef5;border-radius:999px;overflow:hidden}
</html>
