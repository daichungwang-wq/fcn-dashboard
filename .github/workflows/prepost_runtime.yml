name: prepost-runtime

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "40 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-prepost-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install --upgrade yfinance pandas

      - name: Build pre/post runtime
        run: python scripts/runtime/update_prepost_runtime.py

      - name: Commit pre/post runtime if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mm/prepost_runtime.json
          if git diff --cached --quiet; then
            echo "No pre/post runtime changes."
          else
            git commit -m "chore: update prepost runtime"
            git push
          fi
