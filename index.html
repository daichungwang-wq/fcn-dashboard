<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>振宇FCN系統</title>

<style>
body {
  font-family: -apple-system;
  background: #111;
  color: #fff;
  padding: 16px;
}

h2 {margin-top:20px;}

.card {
  background:#1c1c1e;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

.green {color:#4cd964;}
.yellow {color:#ffd60a;}
.red {color:#ff3b30;}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  margin-right:6px;
}

.yes {background:#4cd964;}
.no {background:#ff3b30;}
</style>
</head>

<body>

<h2>📊 FCN 即時風險</h2>

<div class="card">
ORCL：<span class="yellow">持續關注</span><br>
TSLA：<span class="green">健康</span><br>
NVDA：<span class="green">健康</span>
</div>

<h2>🧠 今日策略</h2>

<div class="card">
ORCL → 移除<br>
<button class="yes">同意</button>
<button class="no">拒絕</button>
</div>

<h2>🌍 晨報模組</h2>

<div class="card">
國際新聞 / 財經 / AI / 總經
</div>

</body>
</html>
