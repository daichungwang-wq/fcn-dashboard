<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M1｜市場資訊</title>

<style>
body {
  font-family: Arial, "Microsoft JhengHei";
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.page {
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 16px;
  border: 1px solid #ddd;
}

.title {
  font-weight: 800;
  margin-bottom: 10px;
}

.news-item {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.news-item:last-child {
  border-bottom: none;
}

.stock {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}

.green { color: #0a8f3c; }
.red { color: #c62828; }

</style>
</head>

<body>
<div class="page">

<h1>📊 M1｜市場資訊</h1>

<!-- 宏觀 -->
<div class="card">
  <div class="title">🌍 總經市場</div>
  <div id="macro"></div>
</div>

<!-- 新聞 -->
<div class="card">
  <div class="title">📰 國際新聞</div>
  <div id="news"></div>
</div>

<!-- 股票 -->
<div class="card">
  <div class="title">📈 核心股票</div>
  <div id="stocks"></div>
</div>

</div>

<script>
async function loadData() {

  // 讀 news
  const news = await fetch("./data/news.json").then(r=>r.json());

  // 讀 market
  const market = await fetch("./data/market_runtime.json").then(r=>r.json());

  renderNews(news);
  renderMacro(market);
  renderStocks(market);
}

// ---------------------
// 📰 新聞
// ---------------------
function renderNews(data) {
  const el = document.getElementById("news");

  el.innerHTML = data.slice(0,10).map(n => `
    <div class="news-item">
      <b>${n.title}</b><br>
      <span style="color:#666">${n.summary}</span>
    </div>
  `).join("");
}

// ---------------------
// 🌍 總經
// ---------------------
function renderMacro(market) {
  const el = document.getElementById("macro");

  el.innerHTML = `
    <div>更新時間：${market.NVDA?.last_update || "-"}</div>
    <div>市場股票數：${Object.keys(market).length}</div>
  `;
}

// ---------------------
// 📈 股票
// ---------------------
function renderStocks(market) {
  const el = document.getElementById("stocks");

  const symbols = Object.keys(market).slice(0,10);

  el.innerHTML = symbols.map(s => {
    const m = market[s];
    const ret = m.ret_1d || 0;

    return `
      <div class="stock">
        <div>${s}</div>
        <div>
          ${m.price_now.toFixed(2)}
          <span class="${ret>=0?'green':'red'}">
            ${(ret*100).toFixed(2)}%
          </span>
        </div>
      </div>
    `;
  }).join("");
}

// 啟動
loadData();
</script>

</body>
</html>
