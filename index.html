<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>振宇 FCN 系統</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f6f8;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 14px;
      border-radius: 12px;
      border: none;
      background: #3b6ef5;
      color: white;
      margin: 4px;
      cursor: pointer;
    }

    .btn-outline {
      background: white;
      color: #3b6ef5;
      border: 1px solid #3b6ef5;
    }

    .stock-card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .extra {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>振宇 FCN 系統</h1>

    <!-- 新版 M3 容器 -->
    <div id="module3"></div>
  </div>

  <!-- 模組化 main.js -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
